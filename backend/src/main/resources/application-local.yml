    username: postgres.inxhvlitwjkhizgjpjzz
    password: 9A_XGMa?inRyXAH
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        reWriteBatchedInserts: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
