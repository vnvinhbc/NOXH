spring:
  application:
    name: noxh

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:noxh}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

springdoc:
  swagger-ui:
    url: /swagger.yaml

jwt:
  signer-key: ${JWT_SIGNER_KEY:3f8b2c9d1e4a7f6b0c5d2e8a9b3f7c1d4e2a8b5c9f0d3e6a1b7c2f4d8e9a0b1}
  valid-duration: 300
  refreshable-duration: 2592000

otp:
  expiry-minutes: 5

app:
  mail:
    from: ${MAIL_FROM:noreply@noxh.gov.vn}
    from-name: "Hệ thống NOXH"
